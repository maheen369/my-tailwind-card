<!DOCTYPE html>
<html>
<head>
    <title>My Profile Page</title>
    
    <style>
      body { 
          background-color: #f5f5f5; 
          font-family: sans-serif; 
      }
      
      img { 
          border-radius: 50%; 
          width: 150px; 
          height: 150px; 
          border: 4px solid white; 
          box-shadow: 0px 4px 10px rgba(0,0,0,0.1); 
          margin-bottom: 15px;
      }

      /* Naye buttons ka style */
      .social-btn {
          display: block;
          width: 200px;
          background-color: #e1306c; /* Instagram color */
          color: white;
          padding: 12px;
          margin: 10px auto;
          text-decoration: none;
          border-radius: 25px;
          font-weight: bold;
          box-shadow: 0px 3px 6px rgba(0,0,0,0.1);
      }

      /* Dusre button ka rang badalne ke liye */
      .whatsapp {
          background-color: #25d366; /* WhatsApp green */
      }
    </style>
</head>
<body>

<center>
    <h1>Maheen</h1>
    <p>i am a Frontend Web Developer hoon!</p>
    
    <img src="https://picsum.photos/150" alt="Profile Picture">

    <a href="#" class="social-btn">Instagram</a>
    <a href="#" class="social-btn whatsapp">WhatsApp</a>
</center>

</body>
</html>
